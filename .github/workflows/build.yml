name: Build Bootstrap & Payload

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - ".github/**"
      - "docs/**"

  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"

  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: app-linux
          - os: windows-latest
            platform: windows/amd64
            artifact_name: app-windows
          - os: macos-latest
            platform: darwin/arm64
            artifact_name: app-macos-arm64
          - os: macos-latest
            platform: darwin/amd64
            artifact_name: app-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # ─── Bootstrap binary (pure Go, no Wails) ───
      - name: Build bootstrap
        shell: bash
        env:
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          ED25519_PUBLIC_KEY_HEX: ${{ secrets.ED25519_PUBLIC_KEY_HEX }}
          FALLBACK_DOWNLOAD_URL: ${{ secrets.FALLBACK_DOWNLOAD_URL }}
        run: |
          mkdir -p build/bin
          LDFLAGS="-s -w"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/bootstrap.UpdateServerURL=${UPDATE_SERVER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/bootstrap.Ed25519PublicKeyHex=${ED25519_PUBLIC_KEY_HEX}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/bootstrap.FallbackDownloadURL=${FALLBACK_DOWNLOAD_URL}'"
          if [ "${{ matrix.platform }}" = "windows/amd64" ]; then
            GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o build/bin/PorkLauncher.exe ./cmd/bootstrap
          elif [ "${{ matrix.platform }}" = "darwin/arm64" ]; then
            GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o build/bin/PorkLauncher-darwin-arm64 ./cmd/bootstrap
            chmod +x build/bin/PorkLauncher-darwin-arm64
          elif [ "${{ matrix.platform }}" = "darwin/amd64" ]; then
            GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o build/bin/PorkLauncher-darwin-amd64 ./cmd/bootstrap
            chmod +x build/bin/PorkLauncher-darwin-amd64
          else
            GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o build/bin/PorkLauncher ./cmd/bootstrap
            chmod +x build/bin/PorkLauncher
          fi

      # ─── Update helper ───
      - name: Build update-helper
        shell: bash
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"
          if [ "${{ matrix.platform }}" = "windows/amd64" ]; then
            go build -ldflags="${LDFLAGS}" -o build/bin/update-helper.exe ./cmd/update-helper
          elif [ "${{ matrix.platform }}" = "darwin/arm64" ]; then
            go build -ldflags="${LDFLAGS}" -o build/bin/update-helper-darwin-arm64 ./cmd/update-helper
            chmod +x build/bin/update-helper-darwin-arm64
          elif [ "${{ matrix.platform }}" = "darwin/amd64" ]; then
            go build -ldflags="${LDFLAGS}" -o build/bin/update-helper-darwin-amd64 ./cmd/update-helper
            chmod +x build/bin/update-helper-darwin-amd64
          else
            go build -ldflags="${LDFLAGS}" -o build/bin/update-helper ./cmd/update-helper
            chmod +x build/bin/update-helper
          fi

      # ─── Payload (Wails app) ───
      - name: Build Wails payload (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        env:
          CGO_ENABLED: 0
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"
          wails build -platform linux/amd64 -tags webkit2_41 -o HyLauncher -ldflags "${LDFLAGS}"

      - name: Build Wails payload (Windows)
        if: startsWith(matrix.os, 'windows')
        env:
          CGO_ENABLED: 0
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          $env:LDFLAGS = "-X 'HyLauncher/internal/config.AzuriomBaseURL=$env:AZURIOM_BASE_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.SessionServiceURL=$env:SESSION_SERVICE_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.PatchDomain=$env:PATCH_DOMAIN'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.PatchAPIURL=$env:PATCH_API_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.GamePatchesURL=$env:GAME_PATCHES_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.ServerLogoURL=$env:SERVER_LOGO_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.ServerBannerURL=$env:SERVER_BANNER_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.ServerIP=$env:SERVER_IP'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.ServerName=$env:SERVER_NAME'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.JREManifestURL=$env:JRE_MANIFEST_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.ButlerBaseURL=$env:BUTLER_BASE_URL'"
          $env:LDFLAGS += " -X 'HyLauncher/internal/config.DiscordAppID=$env:DISCORD_APP_ID'"
          wails build -platform windows/amd64 -o HyLauncher -ldflags "$env:LDFLAGS"

      - name: Build Wails payload (macOS ARM64)
        if: matrix.platform == 'darwin/arm64'
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"
          wails build -platform darwin/arm64 -o HyLauncher.app -ldflags "${LDFLAGS}"

      - name: Build Wails payload (macOS AMD64)
        if: matrix.platform == 'darwin/amd64'
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"
          wails build -platform darwin/amd64 -o HyLauncher.app -ldflags "${LDFLAGS}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/*

  cleanup:
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.workflow_run.id != '${{ github.run_id }}') | .id')

          for id in $ARTIFACTS; do
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
