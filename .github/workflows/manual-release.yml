name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
      notes:
        description: "Optional release notes"
        required: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            platform: windows/amd64
            artifact: windows
          - os: macos-latest
            name: macOS ARM64
            platform: darwin/arm64
            artifact: macos-arm64
          - os: macos-latest
            name: macOS AMD64
            platform: darwin/amd64
            artifact: macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS (Windows)
        if: startsWith(matrix.platform, 'windows/')
        shell: powershell
        run: |
          choco install nsis -y
          $env:NSIS_PATH = "C:\Program Files (x86)\NSIS\Bin"
          Write-Output "$env:NSIS_PATH" | Out-File -FilePath $env:GITHUB_PATH -Append
          $env:PATH = "$env:NSIS_PATH;$env:PATH"
          Write-Output "NSIS installed at: $env:NSIS_PATH"
          Get-Command makensis

      # ─────────────────────────────────────────────
      # BOOTSTRAP BUILD (pure Go, no Wails, no secrets except update URL + pubkey)
      # ─────────────────────────────────────────────

      - name: Build bootstrap (Windows)
        if: startsWith(matrix.platform, 'windows/')
        shell: powershell
        env:
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          ED25519_PUBLIC_KEY_HEX: ${{ secrets.ED25519_PUBLIC_KEY_HEX }}
          FALLBACK_DOWNLOAD_URL: ${{ secrets.FALLBACK_DOWNLOAD_URL }}
        run: |
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          $bsLdflags = "-s -w"
          $bsLdflags += " -X 'HyLauncher/internal/bootstrap.UpdateServerURL=$env:UPDATE_SERVER_URL'"
          $bsLdflags += " -X 'HyLauncher/internal/bootstrap.Ed25519PublicKeyHex=$env:ED25519_PUBLIC_KEY_HEX'"
          $bsLdflags += " -X 'HyLauncher/internal/bootstrap.FallbackDownloadURL=$env:FALLBACK_DOWNLOAD_URL'"
          go build -ldflags="$bsLdflags" -o "release/PorkLauncher-bootstrap-windows-x64.exe" ./cmd/bootstrap
          if (-not (Test-Path "release/PorkLauncher-bootstrap-windows-x64.exe")) {
              throw "Failed to build bootstrap"
          }
          Write-Host "Bootstrap built successfully"

      - name: Build bootstrap (macOS)
        if: startsWith(matrix.platform, 'darwin/')
        env:
          UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
          ED25519_PUBLIC_KEY_HEX: ${{ secrets.ED25519_PUBLIC_KEY_HEX }}
          FALLBACK_DOWNLOAD_URL: ${{ secrets.FALLBACK_DOWNLOAD_URL }}
        run: |
          set -e
          mkdir -p release
          BS_LDFLAGS="-s -w"
          BS_LDFLAGS="${BS_LDFLAGS} -X 'HyLauncher/internal/bootstrap.UpdateServerURL=${UPDATE_SERVER_URL}'"
          BS_LDFLAGS="${BS_LDFLAGS} -X 'HyLauncher/internal/bootstrap.Ed25519PublicKeyHex=${ED25519_PUBLIC_KEY_HEX}'"
          BS_LDFLAGS="${BS_LDFLAGS} -X 'HyLauncher/internal/bootstrap.FallbackDownloadURL=${FALLBACK_DOWNLOAD_URL}'"

          if [ "${{ matrix.platform }}" = "darwin/arm64" ]; then
            GOOS=darwin GOARCH=arm64 go build -ldflags="${BS_LDFLAGS}" -o release/PorkLauncher-bootstrap-macos-arm64 ./cmd/bootstrap
            chmod +x release/PorkLauncher-bootstrap-macos-arm64
          else
            GOOS=darwin GOARCH=amd64 go build -ldflags="${BS_LDFLAGS}" -o release/PorkLauncher-bootstrap-macos-amd64 ./cmd/bootstrap
            chmod +x release/PorkLauncher-bootstrap-macos-amd64
          fi
          echo "Bootstrap built successfully"

      # ─────────────────────────────────────────────
      # PAYLOAD BUILD (Wails app with all business logic secrets)
      # ─────────────────────────────────────────────

      - name: Build payload (Windows)
        if: startsWith(matrix.platform, 'windows/')
        shell: powershell
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          # Build update-helper
          $ldflags = "-X 'HyLauncher/internal/config.AzuriomBaseURL=$env:AZURIOM_BASE_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.SessionServiceURL=$env:SESSION_SERVICE_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.PatchDomain=$env:PATCH_DOMAIN'"
          $ldflags += " -X 'HyLauncher/internal/config.PatchAPIURL=$env:PATCH_API_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.GamePatchesURL=$env:GAME_PATCHES_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.ServerLogoURL=$env:SERVER_LOGO_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.ServerBannerURL=$env:SERVER_BANNER_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.ServerIP=$env:SERVER_IP'"
          $ldflags += " -X 'HyLauncher/internal/config.ServerName=$env:SERVER_NAME'"
          $ldflags += " -X 'HyLauncher/internal/config.JREManifestURL=$env:JRE_MANIFEST_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.ButlerBaseURL=$env:BUTLER_BASE_URL'"
          $ldflags += " -X 'HyLauncher/internal/config.DiscordAppID=$env:DISCORD_APP_ID'"
          go build -ldflags="$ldflags" -o "release/update-helper-windows.exe" ./cmd/update-helper

          # Add NSIS to PATH
          $env:PATH = "C:\Program Files (x86)\NSIS\Bin;$env:PATH"

          # Build Wails payload
          $wailsLdflags = $ldflags
          wails build -platform windows/amd64 -ldflags "$wailsLdflags"

          # Package payload as ZIP for bootstrap delivery
          $payloadDir = "payload-staging"
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null
          Copy-Item "build/bin/HyLauncher.exe" "$payloadDir/HyLauncher.exe" -Force
          Copy-Item "release/update-helper-windows.exe" "$payloadDir/update-helper.exe" -Force
          Compress-Archive -Path "$payloadDir/*" -DestinationPath "release/payload-windows-amd64.zip" -Force

          # Also build standalone portable + installer for direct download
          $versionSuffix = if ($env:VERSION) { "-$env:VERSION" } else { "" }
          $outputName = "PorkLauncher-windows-x64$versionSuffix"
          Copy-Item "build/bin/HyLauncher.exe" "release/$outputName-portable.exe" -Force

          wails build -platform windows/amd64 -nsis -ldflags "$wailsLdflags"
          $installerSource = "build/bin/HyLauncher-amd64-installer.exe"
          if (Test-Path $installerSource) {
              Copy-Item $installerSource "release/$outputName-setup.exe" -Force
          }

          Write-Host "`nRelease artifacts:"
          Get-ChildItem "release/*" | Select-Object Name, @{N="Size";E={"{0:N0} KB" -f ($_.Length/1KB)}}

      - name: Build payload (macOS ARM64)
        if: matrix.platform == 'darwin/arm64'
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          set -e
          VERSION="${{ inputs.version }}"
          echo "Building macOS ARM64 payload v$VERSION"

          mkdir -p release
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"

          # Build update-helper
          go build -ldflags="${LDFLAGS}" -o release/update-helper-macos-arm64 ./cmd/update-helper
          chmod +x release/update-helper-macos-arm64

          # Build Wails payload
          wails build -platform darwin/arm64 -ldflags "${LDFLAGS}"

          if [ ! -d "build/bin/HyLauncher.app" ]; then
            echo "ERROR: Build failed - HyLauncher.app not found"
            ls -la build/bin/
            exit 1
          fi

          # Package payload as ZIP for bootstrap delivery
          cd build/bin && zip -r ../../release/payload-darwin-arm64.zip HyLauncher.app && cd ../..

          # Also create standalone DMG for direct download
          npm install -g create-dmg
          create-dmg \
            --volname "PorkLauncher" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "release/PorkLauncher-macos-arm64.dmg" \
            "build/bin/HyLauncher.app" || true

          if [ ! -f "release/PorkLauncher-macos-arm64.dmg" ]; then
            echo "DMG creation failed, creating ZIP fallback..."
            cp release/payload-darwin-arm64.zip release/PorkLauncher-macos-arm64.zip
          fi

          echo "macOS ARM64 build complete:"
          ls -lh release/* || true

      - name: Build payload (macOS AMD64)
        if: matrix.platform == 'darwin/amd64'
        env:
          AZURIOM_BASE_URL: ${{ secrets.AZURIOM_BASE_URL }}
          SESSION_SERVICE_URL: ${{ secrets.SESSION_SERVICE_URL }}
          PATCH_DOMAIN: ${{ secrets.PATCH_DOMAIN }}
          PATCH_API_URL: ${{ secrets.PATCH_API_URL }}
          GAME_PATCHES_URL: ${{ secrets.GAME_PATCHES_URL }}
          SERVER_LOGO_URL: ${{ secrets.SERVER_LOGO_URL }}
          SERVER_BANNER_URL: ${{ secrets.SERVER_BANNER_URL }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          JRE_MANIFEST_URL: ${{ secrets.JRE_MANIFEST_URL }}
          BUTLER_BASE_URL: ${{ secrets.BUTLER_BASE_URL }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
        run: |
          set -e
          VERSION="${{ inputs.version }}"
          echo "Building macOS AMD64 payload v$VERSION"

          mkdir -p release
          LDFLAGS="-X 'HyLauncher/internal/config.AzuriomBaseURL=${AZURIOM_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.SessionServiceURL=${SESSION_SERVICE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchDomain=${PATCH_DOMAIN}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.PatchAPIURL=${PATCH_API_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.GamePatchesURL=${GAME_PATCHES_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerLogoURL=${SERVER_LOGO_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerBannerURL=${SERVER_BANNER_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerIP=${SERVER_IP}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ServerName=${SERVER_NAME}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.JREManifestURL=${JRE_MANIFEST_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.ButlerBaseURL=${BUTLER_BASE_URL}'"
          LDFLAGS="${LDFLAGS} -X 'HyLauncher/internal/config.DiscordAppID=${DISCORD_APP_ID}'"

          # Build update-helper
          go build -ldflags="${LDFLAGS}" -o release/update-helper-macos-amd64 ./cmd/update-helper
          chmod +x release/update-helper-macos-amd64

          # Build Wails payload
          wails build -platform darwin/amd64 -ldflags "${LDFLAGS}"

          if [ ! -d "build/bin/HyLauncher.app" ]; then
            echo "ERROR: Build failed - HyLauncher.app not found"
            ls -la build/bin/
            exit 1
          fi

          # Package payload as ZIP for bootstrap delivery
          cd build/bin && zip -r ../../release/payload-darwin-amd64.zip HyLauncher.app && cd ../..

          # Also create standalone DMG for direct download
          npm install -g create-dmg
          create-dmg \
            --volname "PorkLauncher" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "release/PorkLauncher-macos-amd64.dmg" \
            "build/bin/HyLauncher.app" || true

          if [ ! -f "release/PorkLauncher-macos-amd64.dmg" ]; then
            echo "DMG creation failed, creating ZIP fallback..."
            cp release/payload-darwin-amd64.zip release/PorkLauncher-macos-amd64.zip
          fi

          echo "macOS AMD64 build complete:"
          ls -lh release/* || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: false

      - name: Debug artifact structure
        run: |
          echo "Artifact directory structure:"
          find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"
          ls -la artifacts/ 2>/dev/null || echo "Artifacts dir empty"

      - name: Prepare release files
        run: |
          mkdir -p release

          echo "Available artifact directories:"
          find artifacts -type d 2>/dev/null || true

          for dir in artifacts/release-*/; do
            if [ -d "$dir" ] && [ "$(ls -A $dir)" ]; then
              echo "Copying from $dir..."
              cp -r "$dir"* release/
            fi
          done

          echo "Files in release directory:"
          ls -la release/

          if [ ! "$(ls -A release)" ]; then
            echo "Error: No release files found!"
            exit 1
          fi

      - name: Generate metadata.json and sign
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: |
          VERSION="${{ inputs.version }}"
          REPO="${{ github.repository }}"

          echo "Calculating payload checksums..."

          # Payload ZIPs (delivered by bootstrap)
          WIN_PAYLOAD_SHA=$(sha256sum release/payload-windows-amd64.zip | cut -d' ' -f1)
          WIN_PAYLOAD_SIZE=$(stat -c%s release/payload-windows-amd64.zip)

          MAC_ARM64_PAYLOAD_SHA=$(sha256sum release/payload-darwin-arm64.zip | cut -d' ' -f1)
          MAC_ARM64_PAYLOAD_SIZE=$(stat -c%s release/payload-darwin-arm64.zip)

          MAC_AMD64_PAYLOAD_SHA=$(sha256sum release/payload-darwin-amd64.zip | cut -d' ' -f1)
          MAC_AMD64_PAYLOAD_SIZE=$(stat -c%s release/payload-darwin-amd64.zip)

          echo "Generating metadata.json..."
          cat <<EOF > release/metadata.json
          {
            "version": "$VERSION",
            "payload": {
              "windows/amd64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/payload-windows-amd64.zip",
                "sha256": "$WIN_PAYLOAD_SHA",
                "size": $WIN_PAYLOAD_SIZE
              },
              "darwin/arm64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/payload-darwin-arm64.zip",
                "sha256": "$MAC_ARM64_PAYLOAD_SHA",
                "size": $MAC_ARM64_PAYLOAD_SIZE
              },
              "darwin/amd64": {
                "url": "https://github.com/$REPO/releases/download/v$VERSION/payload-darwin-amd64.zip",
                "sha256": "$MAC_AMD64_PAYLOAD_SHA",
                "size": $MAC_AMD64_PAYLOAD_SIZE
              }
            },
            "min_bootstrap_version": "1.0.0"
          }
          EOF

          # Sign metadata.json with Ed25519
          if [ -n "$ED25519_PRIVATE_KEY" ]; then
            echo "Signing metadata.json..."
            echo -n "$ED25519_PRIVATE_KEY" > /tmp/private.key
            go run ./tools/sign-payload -sign -key /tmp/private.key -input release/metadata.json
            rm -f /tmp/private.key
            echo "Metadata signed successfully"
          else
            echo "WARNING: ED25519_PRIVATE_KEY not set, skipping signature"
          fi

      - name: Generate legacy version.json (backward compatibility)
        run: |
          VERSION="${{ inputs.version }}"
          REPO="${{ github.repository }}"

          # Windows
          WINDOWS_PORTABLE_SHA=$(sha256sum release/PorkLauncher-windows-x64-portable.exe 2>/dev/null | cut -d' ' -f1 || echo "")
          WINDOWS_SETUP_SHA=$(sha256sum release/PorkLauncher-windows-x64-setup.exe 2>/dev/null | cut -d' ' -f1 || echo "")
          WINDOWS_HELPER_SHA=$(sha256sum release/update-helper-windows.exe 2>/dev/null | cut -d' ' -f1 || echo "")

          # macOS
          if [ -f "release/PorkLauncher-macos-arm64.dmg" ]; then
            MACOS_ARM64_SHA=$(sha256sum release/PorkLauncher-macos-arm64.dmg | cut -d' ' -f1)
            MACOS_ARM64_EXT="dmg"
          elif [ -f "release/PorkLauncher-macos-arm64.zip" ]; then
            MACOS_ARM64_SHA=$(sha256sum release/PorkLauncher-macos-arm64.zip | cut -d' ' -f1)
            MACOS_ARM64_EXT="zip"
          fi
          MACOS_ARM64_HELPER_SHA=$(sha256sum release/update-helper-macos-arm64 2>/dev/null | cut -d' ' -f1 || echo "")

          if [ -f "release/PorkLauncher-macos-amd64.dmg" ]; then
            MACOS_AMD64_SHA=$(sha256sum release/PorkLauncher-macos-amd64.dmg | cut -d' ' -f1)
            MACOS_AMD64_EXT="dmg"
          elif [ -f "release/PorkLauncher-macos-amd64.zip" ]; then
            MACOS_AMD64_SHA=$(sha256sum release/PorkLauncher-macos-amd64.zip | cut -d' ' -f1)
            MACOS_AMD64_EXT="zip"
          fi
          MACOS_AMD64_HELPER_SHA=$(sha256sum release/update-helper-macos-amd64 2>/dev/null | cut -d' ' -f1 || echo "")

          cat <<EOF > release/version.json
          {
            "version": "$VERSION",
            "windows": {
              "amd64": {
                "portable": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/PorkLauncher-windows-x64-portable.exe",
                  "sha256": "$WINDOWS_PORTABLE_SHA"
                },
                "setup": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/PorkLauncher-windows-x64-setup.exe",
                  "sha256": "$WINDOWS_SETUP_SHA"
                },
                "helper": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/update-helper-windows.exe",
                  "sha256": "$WINDOWS_HELPER_SHA"
                }
              }
            },
            "darwin": {
              "arm64": {
                "launcher": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/PorkLauncher-macos-arm64.${MACOS_ARM64_EXT:-zip}",
                  "sha256": "${MACOS_ARM64_SHA:-}"
                },
                "helper": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/update-helper-macos-arm64",
                  "sha256": "$MACOS_ARM64_HELPER_SHA"
                }
              },
              "amd64": {
                "launcher": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/PorkLauncher-macos-amd64.${MACOS_AMD64_EXT:-zip}",
                  "sha256": "${MACOS_AMD64_SHA:-}"
                },
                "helper": {
                  "url": "https://github.com/$REPO/releases/download/v$VERSION/update-helper-macos-amd64",
                  "sha256": "$MACOS_AMD64_HELPER_SHA"
                }
              }
            }
          }
          EOF

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Generating changelog..."
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')

          if [ -z "$PREV_TAG" ]; then
            echo "Initial release" > changelog.txt
          else
            git log "$PREV_TAG"..HEAD \
              --pretty=format:"- %s (%h)" > changelog.txt
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: changelog.txt
          files: |
            release/*

  cleanup:
    name: Cleanup
    needs: release
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Delete old workflow artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching artifacts..."

          ARTIFACTS=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.workflow_run.id != '${{ github.run_id }}') | .id')

          if [ -z "$ARTIFACTS" ]; then
            echo "No old artifacts found."
            exit 0
          fi

          for id in $ARTIFACTS; do
            echo "Deleting artifact ID: $id"
            gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
          done
